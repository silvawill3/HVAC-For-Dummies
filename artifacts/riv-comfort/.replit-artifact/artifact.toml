kind = "web"
previewPath = "/"
title = "Riv Comfort HVAC"
version = "1.0.0"
id = "artifacts/riv-comfort"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21529

[services.development]
run = "pnpm --filter @workspace/riv-comfort run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/riv-comfort", "run", "build" ]
serve = "static"
publicDir = "artifacts/riv-comfort/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21529"
BASE_PATH = "/"
